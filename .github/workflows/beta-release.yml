name: Beta Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

jobs:
  build_and_beta_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is from dev branch
        run: |
          if ! git branch -r --contains ${{ github.sha }} | grep -q "origin/dev"; then
            echo "❌ Beta tags must originate from the dev branch"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Validate version consistency
        run: |
          TAG_VERSION=${{ github.ref_name }}
          BASE_VERSION=$(echo "$TAG_VERSION" | sed 's/-beta\.[0-9]*$//')
          MANIFEST_VERSION=$(jq -r '.version' manifest.json)
          if [ "$BASE_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "❌ Version mismatch: tag base=$BASE_VERSION manifest=$MANIFEST_VERSION"
            exit 1
          fi

      - name: Create GitHub Pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          gh release create "$TAG" \
            --title "$TAG (Beta)" \
            --generate-notes \
            --prerelease

          gh release upload "$TAG" \
            main.js \
            manifest.json \
            styles.css \
            --clobber
